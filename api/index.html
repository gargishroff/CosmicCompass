<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Compass Chat</title>
    <!-- Load Tailwind CSS from CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Use the Inter font */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F3F4F6; /* gray-100 */
        }
        /* Custom scrollbar for chat */
        #chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        #chat-messages::-webkit-scrollbar-thumb {
            background-color: #9CA3AF; /* gray-400 */
            border-radius: 3px;
        }
        #chat-messages::-webkit-scrollbar-track {
            background-color: #F3F4F6; /* gray-100 */
        }
        /* Style for the log bubbles */
        .log-bubble pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.8rem;
            font-family: 'Menlo', 'Consolas', monospace;
        }
    </style>
</head>
<body>

    <!-- 
      NEW: Login Screen
      This is shown by default.
    -->
    <div id="login-screen" class="flex items-center justify-center h-screen">
        <div class="bg-white p-8 rounded-lg shadow-2xl max-w-md w-full">
            <header class="text-center mb-6">
                <h1 class="text-3xl font-bold text-gray-900">🔭 Cosmic Compass</h1>
                <p class="text-gray-500 mt-1">Your AI Subject Matter Expert on Astronomy</p>
            </header>
            
            <form id="login-form">
                <div class="mb-4">
                    <label for="email-input" class="block text-sm font-medium text-gray-700 mb-1">Your Email</label>
                    <input 
                        type="email" 
                        id="email-input"
                        placeholder="you@example.com"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-600"
                        required
                    />
                    <p class="text-xs text-gray-500 mt-1">Required to email reports and quizzes.</p>
                </div>

                <fieldset class="mb-6">
                    <legend class="block text-sm font-medium text-gray-700 mb-2">Optional: Preferred Format</legend>
                    <div class="flex space-x-4">
                        <label for="format-pdf" class="flex items-center">
                            <input type="radio" id="format-pdf" name="format" value="pdf" class="focus:ring-gray-600 h-4 w-4 text-gray-800 border-gray-300">
                            <span class="ml-2 text-sm text-gray-700">LaTeX PDF</span>
                        </label>
                        <label for="format-docx" class="flex items-center">
                            <input type="radio" id="format-docx" name="format" value="docx" class="focus:ring-gray-600 h-4 w-4 text-gray-800 border-gray-300">
                            <span class="ml-2 text-sm text-gray-700">DOCX</span>
                        </label>
                    </div>
                </fieldset>

                <button 
                    type="submit" 
                    id="start-chat-button"
                    class="w-full px-6 py-3 bg-gray-800 text-white rounded-lg font-semibold shadow-lg hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-600 focus:ring-offset-2 transition duration-200">
                    Start Chat
                </button>
            </form>
        </div>
    </div>

    <!-- 
      EXISTING: Chat Screen
      This is hidden by default.
    -->
    <div id="chat-screen" class="flex flex-col h-screen max-w-3xl mx-auto bg-white shadow-2xl rounded-lg overflow-hidden hidden">
        <!-- Header -->
        <header class="bg-gradient-to-r from-gray-800 to-gray-900 text-white p-4 shadow-md">
            <h1 class="text-2xl font-bold text-center">🔭 Cosmic Compass</h1>
            <p id="email-display" class="text-center text-sm text-gray-300"></p>
        </header>

        <!-- Chat Messages Area -->
        <main id="chat-messages" class="flex-1 p-4 space-y-4 overflow-y-auto">
            <!-- Welcome Message -->
            <div id="welcome-message-container" class="flex justify-start">
                <div class="bg-gray-200 text-gray-800 p-3 rounded-lg max-w-lg shadow">
                    <!-- This text will be updated by JS -->
                    <p id="welcome-message">Hello, I am Cosmic Compass! I can generate quizzes, reports, and answer your questions about the cosmos!</p>
                </div>
            </div>
        </main>

        <!-- Typing Indicator -->
        <div id="typing-indicator" class="p-4 text-sm text-gray-500 hidden">
            <p>Cosmic Compass is thinking...</p>
        </div>

        <!-- Input Form -->
        <footer class="p-4 bg-gray-50 border-t border-gray-200">
            <form id="chat-form" class="flex space-x-3">
                <input 
                    type="text" 
                    id="message-input"
                    placeholder="Type your message here..."
                    autocomplete="off"
                    class="flex-1 px-4 py-2 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-gray-600 shadow-sm"
                />
                <button 
                    type="submit" 
                    id="send-button"
                    class="px-6 py-2 bg-gray-800 text-white rounded-full font-semibold shadow-lg hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-600 focus:ring-offset-2 transition duration-200">
                    Send
                </button>
            </form>
        </footer>
    </div>

    <script>
        // --- DOM Elements ---
        const loginScreen = document.getElementById('login-screen');
        const chatScreen = document.getElementById('chat-screen');
        const loginForm = document.getElementById('login-form');
        const emailInput = document.getElementById('email-input');
        const emailDisplay = document.getElementById('email-display');
        const welcomeMessage = document.getElementById('welcome-message');

        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const chatMessages = document.getElementById('chat-messages');
        const typingIndicator = document.getElementById('typing-indicator');

        // --- Chat State ---
        let chatHistory = []; // This will be populated by the login form

        // --- Event Listeners ---
        loginForm.addEventListener('submit', handleLogin);
        chatForm.addEventListener('submit', handleChatSubmit);

        /**
         * Handles the login form submission.
         * This is the NEW function that starts everything.
         */
        function handleLogin(event) {
            event.preventDefault();
            const email = emailInput.value;
            const selectedFormat = document.querySelector('input[name="format"]:checked');

            // --- FULFILLS THE REQUEST ---
            // 1. Build the initial chat history
            chatHistory = [];
            chatHistory.push({ role: "system", content: `User email: ${email}` });

            let welcomeText = `Hello! I'm Cosmic Compass, and I have your email recorded. I can generate quizzes, reports, and answer your questions about the cosmos!`;

            if (selectedFormat) {
                chatHistory.push({ role: "system", content: `User's preferred format is ${selectedFormat.value}` });
                welcomeText += ` I'll default to ${selectedFormat.value} for any reports.`;
            }
            // --- END ---

            // 2. Update the chat UI
            emailDisplay.textContent = `Chatting as: ${email}`;
            welcomeMessage.textContent = welcomeText;

            // 3. Swap the screens
            loginScreen.classList.add('hidden');
            chatScreen.classList.remove('hidden');
        }

        /**
         * Handles the main chat message form submission.
         */
        async function handleChatSubmit(event) {
            event.preventDefault();
            const messageText = messageInput.value.trim();
            if (messageText === '') return;

            // 1. Create user message
            const userMessage = { role: "user", content: messageText };
            
            // 2. Add user message to UI
            addMessageToUI('user', messageText);
            
            // 3. Add user message to history
            chatHistory.push(userMessage);

            // 4. Clear input and disable form
            messageInput.value = '';
            setFormDisabled(true);

            // 5. Start streaming response
            // The chatHistory already contains the email and format preference
            await streamResponse(chatHistory);

            // 6. Re-enable form
            setFormDisabled(false);
        }

        function setFormDisabled(disabled) {
            messageInput.disabled = disabled;
            sendButton.disabled = disabled;
            typingIndicator.classList.toggle('hidden', !disabled);
        }

        /**
         * Adds a new message bubble to the chat UI.
         */
        function addMessageToUI(role, content) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('flex', 'mb-2');
            
            let contentHTML = "";

            if (role === 'user') {
                messageElement.classList.add('justify-end');
                contentHTML = `
                    <div class="bg-gray-800 text-white p-3 rounded-lg max-w-lg shadow">
                        <p>${content}</p>
                    </div>`;
            } else {
                // This is for 'log', 'error', or 'stream_end'
                messageElement.classList.add('justify-start');
                contentHTML = `
                    <div class="bg-gray-100 text-gray-800 p-3 rounded-lg max-w-lg shadow log-bubble">
                        <pre>${content}</pre>
                    </div>`;
            }
            
            messageElement.innerHTML = contentHTML;
            chatMessages.appendChild(messageElement);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        /**
         * Connects to the /api/chat endpoint and streams the response.
         */
        async function streamResponse(messages) {
            let finalAnswer = null; // To store the last message
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: messages })
                });

                if (!response.ok) throw new Error(`API Error: ${response.statusText}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    buffer += decoder.decode(value, { stream: true });
                    const parts = buffer.split("\n");

                    for (let i = 0; i < parts.length - 1; i++) {
                        const part = parts[i].trim();
                        if (part) {
                            try {
                                const messageJson = JSON.parse(part);
                                finalAnswer = processStreamedMessage(messageJson, finalAnswer);
                            } catch (e) {
                                console.warn("Failed to parse JSON chunk:", part, e);
                            }
                        }
                    }
                    buffer = parts[parts.length - 1]; // Keep the last partial chunk

                    if (done) {
                        if (buffer.trim()) { // Process any remainder
                            try { 
                                const messageJson = JSON.parse(buffer); 
                                finalAnswer = processStreamedMessage(messageJson, finalAnswer);
                            } catch (e) { 
                                console.warn("Failed to parse final chunk:", buffer, e); 
                            }
                        }
                        break;
                    }
                }
            } catch (error) {
                addMessageToUI('error', `\n[FRONTEND ERROR] ${error.message}\n`);
            }
            
            // Add the last seen message (the final answer) to the history
            if (finalAnswer) {
                chatHistory.push(finalAnswer);
            }
        }

        /**
         * Processes a single JSON message object from the stream.
         */
        function processStreamedMessage(messageJson, lastAnswer) {
            let currentAnswer = lastAnswer;
            
            if (messageJson.type === 'log') {
                addMessageToUI('agent', messageJson.data);
                // This is the raw 'pretty_print' text
                currentAnswer = { role: 'assistant', content: messageJson.data };
            } else if (messageJson.type === 'error') {
                addMessageToUI('error', `\n[BACKEND ERROR] ${messageJson.data}\n`);
                currentAnswer = { role: 'system', content: messageJson.data };
            } else if (messageJson.type === 'stream_end') {
                // This is just a signal, not a message
            }
            
            // Return the last message to be added to history
            return currentAnswer;
        }
    </script>
</body>
</html>
