<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Compass Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F3F4F6; }
        #chat-messages::-webkit-scrollbar { width: 6px; }
        #chat-messages::-webkit-scrollbar-thumb { background-color: #9CA3AF; border-radius: 3px; }
        #chat-messages::-webkit-scrollbar-track { background-color: #F3F4F6; }
        /* Style for the log bubbles */
        #chat-messages::-webkit-scrollbar {
        width: 6px;
    }
    #chat-messages::-webkit-scrollbar-thumb {
        background-color: #9CA3AF;
        border-radius: 3px;
    }
    #chat-messages::-webkit-scrollbar-track {
        background-color: #F3F4F6;
    }

    /* Force scrolling */
    #chat-messages {
        max-height: calc(100vh - 200px);
        overflow-y: auto;
    }
        .log-bubble pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.8rem;
            font-family: 'Menlo', 'Consolas', monospace;
        }
        /* Modal Styles */
        #modal-backdrop { background-color: rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body>

    <div id="login-screen" class="flex items-center justify-center h-screen">
        <div class="bg-white p-8 rounded-lg shadow-2xl max-w-md w-full">
            <header class="text-center mb-6">
                <h1 class="text-3xl font-bold text-gray-900">🔭 Cosmic Compass</h1>
                <p class="text-gray-500 mt-1">Your AI Subject Matter Expert on Astronomy</p>
            </header>
            
            <form id="login-form">
                <div class="mb-4">
                    <label for="email-input" class="block text-sm font-medium text-gray-700 mb-1">Your Email (Used as Chat ID)</label>
                    <input type="email" id="email-input" placeholder="you@example.com" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-600" required />
                    <p class="text-xs text-gray-500 mt-1">Required for chat history and email.</p>
                </div>

                <fieldset class="mb-6">
                    <legend class="block text-sm font-medium text-gray-700 mb-2">Optional: Preferred Format</legend>
                    <div class="flex space-x-4">
                        <label for="format-pdf" class="flex items-center">
                            <input type="radio" id="format-pdf" name="format" value="pdf" class="focus:ring-gray-600 h-4 w-4 text-gray-800 border-gray-300">
                            <span class="ml-2 text-sm text-gray-700">LaTeX PDF</span>
                        </label>
                        <label for="format-docx" class="flex items-center">
                            <input type="radio" id="format-docx" name="format" value="docx" class="focus:ring-gray-600 h-4 w-4 text-gray-800 border-gray-300">
                            <span class="ml-2 text-sm text-gray-700">DOCX</span>
                        </label>
                    </div>
                </fieldset>

                <button type="submit" id="start-chat-button" class="w-full px-6 py-3 bg-gray-800 text-white rounded-lg font-semibold shadow-lg hover:bg-gray-700">
                    Start Chat
                </button>
            </form>
        </div>
    </div>

    <div id="chat-screen" class="flex-col h-screen max-w-3xl mx-auto bg-white shadow-2xl rounded-lg overflow-hidden hidden">
        <header class="bg-gradient-to-r from-gray-800 to-gray-900 text-white p-4 shadow-md">
            <h1 class="text-2xl font-bold text-center">🔭 Cosmic Compass</h1>
            <p id="email-display" class="text-center text-sm text-gray-300"></p>
        </header>
        <main id="chat-messages" class="flex-1 p-4 space-y-4 overflow-y-auto">
             <div id="welcome-message-container" class="flex justify-start">
                <div class="bg-gray-200 text-gray-800 p-3 rounded-lg max-w-lg shadow">
                    <p id="welcome-message">Hello!</p>
                </div>
            </div>
        </main>
        <div id="typing-indicator" class="p-4 text-sm text-gray-500 hidden"><p>Cosmic Compass is thinking...</p></div>
        <footer class="p-4 bg-gray-50 border-t border-gray-200">
            <form id="chat-form" class="flex space-x-3">
                <input type="text" id="message-input" placeholder="Type your message here..." class="flex-1 px-4 py-2 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-gray-600 shadow-sm" />
                <button type="submit" id="send-button" class="px-6 py-2 bg-gray-800 text-white rounded-full font-semibold shadow-lg hover:bg-gray-700">Send</button>
            </form>
        </footer>
    </div>

    <div id="modal-backdrop" class="fixed inset-0 flex items-center justify-center z-50 hidden bg-gray-900 bg-opacity-50">
        <div id="hitl-modal" class="bg-white p-6 rounded-lg shadow-2xl max-w-2xl w-full">
            <h2 class="text-xl font-bold text-gray-900 mb-2">Review Pending Action</h2>
            <p id="modal-description" class="text-sm text-gray-600 mb-4">Please review and approve, reject, or edit the following tool call.</p>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700">Tool</label>
                <input id="modal-tool-name" type="text" class="w-full p-2 bg-gray-100 border rounded-md" readonly />
            </div>
            
            <div class="mb-4">
                <label for="modal-tool-args" class="block text-sm font-medium text-gray-700">Arguments (Editable)</label>
                <textarea id="modal-tool-args" rows="6" class="w-full p-2 font-mono text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-gray-600"></textarea>
            </div>
            
            <div class="flex justify-end space-x-3">
                <button id="modal-reject" class="px-4 py-2 bg-red-600 text-white rounded-lg font-semibold hover:bg-red-700">Reject</Dbutton>
                <button id="modal-approve" class="px-4 py-2 bg-green-600 text-white rounded-lg font-semibold hover:bg-green-700">Approve</button>
                <button id="modal-edit-submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700">Submit Edit</button>
            </div>
        </div>
    </div>

    <script>
        // --- DOM Elements ---
        const loginScreen = document.getElementById('login-screen');
        const chatScreen = document.getElementById('chat-screen');
        const loginForm = document.getElementById('login-form');
        const emailInput = document.getElementById('email-input');
        const emailDisplay = document.getElementById('email-display');
        const welcomeMessage = document.getElementById('welcome-message');

        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const chatMessages = document.getElementById('chat-messages');
        const typingIndicator = document.getElementById('typing-indicator');
        
        // --- Modal Elements ---
        const modalBackdrop = document.getElementById('modal-backdrop');
        const modalToolName = document.getElementById('modal-tool-name');
        const modalToolArgs = document.getElementById('modal-tool-args');
        const modalDescription = document.getElementById('modal-description');
        const modalApprove = document.getElementById('modal-approve');
        const modalReject = document.getElementById('modal-reject');
        const modalEditSubmit = document.getElementById('modal-edit-submit');

        // --- Chat State ---
        let chatHistory = [];
        let threadId = null; // This will be our email

        // --- Event Listeners ---
        loginForm.addEventListener('submit', handleLogin);
        chatForm.addEventListener('submit', handleChatSubmit);

        function handleLogin(event) {
            event.preventDefault();
            threadId = emailInput.value; // Use email as the Thread ID
            const selectedFormat = document.querySelector('input[name="format"]:checked');
            
            // Build the initial system messages
            chatHistory = [];
            chatHistory.push({ role: "system", content: `User email: ${threadId}` });
            
            let welcomeText = `Hello! I'm Cosmic Compass, and I have your email recorded. I can generate quizzes, reports, and answer your questions!`;
            if (selectedFormat) {
                chatHistory.push({ role: "system", content: `User's preferred format is ${selectedFormat.value}` });
                welcomeText += ` I'll default to ${selectedFormat.value} for any reports.`;
            }

            // Update UI
            emailDisplay.textContent = `Chatting as: ${threadId}`;
            welcomeMessage.textContent = welcomeText;
            loginScreen.classList.add('hidden');
            chatScreen.classList.remove('hidden');
        }

        async function handleChatSubmit(event) {
            event.preventDefault();
            const messageText = messageInput.value.trim();
            if (messageText === '') return;

            const userMessage = { role: "user", content: messageText };
            chatHistory.push(userMessage);
            addMessageToUI('user', messageText);
            messageInput.value = '';
            setFormDisabled(true);

            // Send to the streaming endpoint
            await streamResponse('/api/chat', { messages: chatHistory, thread_id: threadId });
        }

        function setFormDisabled(disabled) {
            messageInput.disabled = disabled;
            sendButton.disabled = disabled;
            typingIndicator.classList.toggle('hidden', !disabled);
        }

        /**
         * Adds a new message bubble to the chat UI.
         */
        function addMessageToUI(role, content) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('flex', 'mb-2');
            let contentHTML = "";

            if (role === 'user') {
                messageElement.classList.add('justify-end');
                contentHTML = `<div class="bg-gray-800 text-white p-3 rounded-lg max-w-lg shadow"><p>${content}</p></div>`;
            } else {
                // This is for 'log', 'error', or 'stream_end'
                messageElement.classList.add('justify-start');
                contentHTML = `
                    <div class="bg-gray-100 text-gray-800 p-3 rounded-lg max-w-lg shadow log-bubble">
                        <pre>${content}</pre>
                    </div>`;
            }
            
            messageElement.innerHTML = contentHTML;
            chatMessages.appendChild(messageElement);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        /**
         * The new central function to handle ALL streaming from the backend.
         */
        async function streamResponse(endpoint, body) {
            let finalAnswer = null;
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                if (!response.ok) throw new Error(`API Error: ${response.statusText}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    buffer += decoder.decode(value, { stream: true });
                    const parts = buffer.split("\n");

                    for (let i = 0; i < parts.length - 1; i++) {
                        const part = parts[i].trim();
                        if (part) {
                            try {
                                const messageJson = JSON.parse(part);
                                finalAnswer = processStreamedMessage(messageJson, finalAnswer);
                                // If we get an interrupt, stop this stream.
                                if (messageJson.type === 'interrupt') {
                                    return; 
                                }
                            } catch (e) {
                                console.warn("Failed to parse JSON chunk:", part, e);
                            }
                        }
                    }
                    buffer = parts[parts.length - 1]; // Keep the last partial chunk

                    if (done) {
                        if (buffer.trim()) { // Process any remainder
                            try { 
                                const messageJson = JSON.parse(buffer); 
                                finalAnswer = processStreamedMessage(messageJson, finalAnswer);
                            } catch (e) { 
                                console.warn("Failed to parse final chunk:", buffer, e); 
                            }
                        }
                        break;
                    }
                }
            } catch (error) {
                addMessageToUI('error', `\n[FRONTEND ERROR] ${error.message}\n`);
            }
            
            // If the stream ends *without* an interrupt, it was a success
            setFormDisabled(false);
            
            // Add the last seen message (the final answer) to the history
            if (finalAnswer) {
                chatHistory.push(finalAnswer);
            }
        }

        /**
         * Processes a single JSON message object from the stream.
         */
        function processStreamedMessage(messageJson, lastAnswer) {
            let currentAnswer = lastAnswer;
            
            if (messageJson.type === 'log') {
                addMessageToUI('agent', messageJson.data);
                currentAnswer = { role: 'assistant', content: messageJson.data };
            
            } else if (messageJson.type === 'interrupt') {
                // The stream will stop, so re-enable the form
                setFormDisabled(false); 
                // Show the modal with the interrupt data
                showInterruptModal(messageJson.data); // data is already the dict
            
            } else if (messageJson.type === 'error') {
                addMessageToUI('error', `\n[BACKEND ERROR] ${messageJson.data}\n`);
                currentAnswer = { role: 'system', content: messageJson.data };
            
            } else if (messageJson.type === 'stream_end') {
                // This is just a signal, not a message
            }
            
            // Return the last message to be added to history
            return currentAnswer;
        }
        
        /**
         * Shows the HITL modal with the tool call details
         */
        function showInterruptModal(interruptData) {
            const action = interruptData.action_requests[0];
            const config = interruptData.review_configs[0];
            
            modalDescription.textContent = action.description || "Review pending action.";
            modalToolName.value = action.name;
            
            // Safely get the 'request' string
            const args = action.args || {};
            modalToolArgs.value = args.request || ""; // Default to empty string

            // Wire up buttons for THIS interrupt
            modalApprove.onclick = () => {
                resumeChatStream({ "decisions": [{"type": "approve"}] });
            };
            
            modalReject.onclick = () => {
                resumeChatStream({ "decisions": [{"type": "reject"}] });
            };
            
            modalEditSubmit.onclick = () => {
                const editedRequestString = modalToolArgs.value;
                resumeChatStream({
                    "decisions": [{
                        "type": "edit",
                        "edited_action": {
                            "name": action.name,
                            "args": { "request": editedRequestString } // Send back the edited string
                        }
                    }]
                });
            };

            // Show/hide buttons based on allowed decisions
            modalApprove.classList.toggle('hidden', !config.allowed_decisions.includes('approve'));
            modalReject.classList.toggle('hidden', !config.allowed_decisions.includes('reject'));
            modalEditSubmit.classList.toggle('hidden', !config.allowed_decisions.includes('edit'));
            
            modalBackdrop.classList.remove('hidden');
        }

        /**
         * Sends the user's decision back to the server
         */
        function resumeChatStream(decision) {
            modalBackdrop.classList.add('hidden'); // Hide modal
            setFormDisabled(true); // Disable form while resuming
            
            // Call the *same* streaming function, but on the /resume endpoint
            streamResponse('/api/chat/resume', { 
                decision: decision, 
                thread_id: threadId 
            });
        }
    </script>
</body>
</html>
